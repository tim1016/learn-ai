# PRD #607 / Slice 2 (#609) — cockpit Playwright E2E job.
#
# Builds the Frontend container, starts it on localhost:4200, runs the
# Playwright suite, and archives the HTML report + traces on failure.
# The suite is hermetic — every cockpit state fixture lives under
# Frontend/src/testing/operator_surface_fixtures/ and is injected via
# page.route() — so this job needs no backend, no database, no broker.
#
# Container orchestration details are intentionally minimal; this is a
# tracer-bullet workflow that downstream slices extend as needed.
name: frontend-e2e

# PRD #619-A §A7 — least-privilege GITHUB_TOKEN. This workflow only
# reads the checked-out source and uploads test artifacts; it never
# pushes commits, opens PRs, or annotates the checks/contents/issues
# APIs. Pin contents:read and rely on the default upload-artifact
# permission instead of inheriting the repository default.
permissions:
  contents: read

on:
  pull_request:
    paths:
      - 'Frontend/**'
      - '.github/workflows/frontend-e2e.yml'
  push:
    branches: [master]
    paths:
      - 'Frontend/**'
      - '.github/workflows/frontend-e2e.yml'

jobs:
  cockpit-e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: Frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: Frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      # PRD #619-A §A7 — dependency-contract test. echarts-gl 2.0.9
      # imports from echarts/lib/util/layout and other internal paths
      # that were removed in echarts ≥ 5.5. The 5.4.3 / 2.0.9 / 5.4.4
      # triple is the verified-compatible set; pinning all three at
      # exact versions (no caret) prevents npm dedupe + transitive
      # bumps from sliding the build back into the failure mode the
      # cockpit-e2e workflow has been broken under since #609.
      - name: Verify echarts + echarts-gl + zrender pinned set
        run: npm ls echarts@5.4.3 echarts-gl@2.0.9 zrender@5.4.4

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Build Frontend
        run: npm run build

      - name: Serve build on :4200
        run: |
          npx http-server dist/frontend/browser -p 4200 -s &
          npx wait-on http://localhost:4200 -t 60000

      - name: Run Playwright suite
        run: npm run e2e

      - name: Archive Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            Frontend/playwright-report/
            Frontend/test-results/
          retention-days: 7
