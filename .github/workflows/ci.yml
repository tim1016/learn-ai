name: CI

on:
  pull_request:
  push:
    branches: [master]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  temporal-authority-guard:
    name: Temporal Authority Guard
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python scripts/check_temporal_authority.py

  frontend-lint:
    name: Frontend Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: Frontend/package-lock.json
      - run: npm ci
      - run: npx eslint src/

  frontend-typecheck:
    name: Frontend Type Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: Frontend/package-lock.json
      - run: npm ci
      - run: npx tsc --noEmit

  frontend-test:
    name: Frontend Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: Frontend/package-lock.json
      - run: npm ci
      - run: npm run test:guards
      - run: npx ng test --watch=false

  backend-lint:
    name: Backend Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"
      - run: dotnet restore podman.sln
      - run: dotnet format podman.sln --verify-no-changes --no-restore

  backend-build:
    name: Backend Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"
      - run: dotnet restore podman.sln
      - run: dotnet build podman.sln --no-restore --configuration Release
        env:
          DOTNET_NOLOGO: true

  backend-test:
    name: Backend Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: postgres
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"
      - run: dotnet restore podman.sln
      - name: Run Backend Tests
        env:
          BACKEND_TEST_POSTGRES_CONNECTION_STRING: Host=localhost;Port=5432;Database=postgres;Username=postgres;Password=postgres
          DOTNET_NOLOGO: true
        run: |
          test -n "$BACKEND_TEST_POSTGRES_CONNECTION_STRING"
          dotnet test Backend.Tests/Backend.Tests.csproj --no-restore --configuration Release --logger "trx;LogFileName=backend-tests.trx" --results-directory TestResults
      - name: Upload backend test results
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: backend-test-results
          path: TestResults/backend-tests.trx
          if-no-files-found: ignore

  python-lint:
    name: Python Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: PythonDataService
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install ruff
      - run: ruff check app/ tests/

  python-test:
    name: Python Tests
    runs-on: ubuntu-latest
    env:
      PYTHON_FAST_BASELINE_TEST_DIRS: >-
        tests/unit tests/indicators tests/edge tests/utils
        tests/engine tests/routers tests/schemas tests/services tests/operator
    defaults:
      run:
        working-directory: PythonDataService
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: PythonDataService/requirements*.txt
      - run: pip install -r requirements-heavy.txt -r requirements-light.txt -r requirements-dev.txt

      # Curated fast baseline + diff-driven extras.
      # Baseline dirs always run; everything else only runs when the diff touches it
      # (either a tests/** file directly, or an app/**/<name>.py with a matching
      # tests/**/test_<name>.py). See discussion in PR introducing this step.
      - name: Compute change-driven extra test paths
        id: changed
        shell: bash
        working-directory: ${{ github.workspace }}
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            base_ref="${{ github.base_ref }}"
            git fetch --no-tags --depth=200 origin "$base_ref" || git fetch --no-tags origin "$base_ref"
            base="origin/${base_ref}"
            range="${base}...HEAD"
          else
            # push to master: diff just the pushed commits
            range="${{ github.event.before }}...${{ github.sha }}"
            if ! git rev-parse --verify "${{ github.event.before }}" >/dev/null 2>&1; then
              range="HEAD~1...HEAD"
            fi
          fi
          changed=$(git diff --name-only "$range" || true)
          # Baseline dirs are always run; skip them here to avoid duplicate paths.
          read -r -a baseline_dirs <<< "$PYTHON_FAST_BASELINE_TEST_DIRS"
          baseline_pattern=$(
            printf '%s\n' "${baseline_dirs[@]}" \
              | sed 's#^#PythonDataService/#' \
              | sed 's#[][(){}.^$*+?|\\]#\\&#g' \
              | paste -sd'|' -
          )
          baseline_pattern="^(${baseline_pattern})(/|$)"
          extra=""
          # (1) Directly-changed test files outside the baseline dirs.
          while IFS= read -r p; do
            [ -z "$p" ] && continue
            case "$p" in
              PythonDataService/tests/*test_*.py)
                if [[ ! "$p" =~ $baseline_pattern ]]; then
                  rel="${p#PythonDataService/}"
                  [ -f "PythonDataService/$rel" ] && extra="$extra $rel"
                fi
                ;;
            esac
          done <<< "$changed"
          # (2) tests/**/test_<name>.py and test_<name>_*.py for each changed app/**/<name>.py.
          while IFS= read -r p; do
            [ -z "$p" ] && continue
            case "$p" in
              PythonDataService/app/*.py)
                stem=$(basename "$p" .py)
                [ "$stem" = "__init__" ] && continue
                while IFS= read -r t; do
                  if [[ ! "PythonDataService/$t" =~ $baseline_pattern ]]; then
                    extra="$extra $t"
                  fi
                done < <(cd PythonDataService && find tests -type f \( -name "test_${stem}.py" -o -name "test_${stem}_*.py" \) 2>/dev/null || true)
                ;;
            esac
          done <<< "$changed"
          extra=$(echo "$extra" | tr ' ' '\n' | awk 'NF' | sort -u | tr '\n' ' ')
          echo "extra=${extra}" >> "$GITHUB_OUTPUT"
          echo "Extra change-driven test paths: ${extra:-<none>}"

      - name: Run fast baseline + change-driven tests
        run: |
          read -r -a baseline_dirs <<< "$PYTHON_FAST_BASELINE_TEST_DIRS"
          extra="${{ steps.changed.outputs.extra }}"
          python -m pytest "${baseline_dirs[@]}" $extra -v -k "not slow" --tb=short

  validate-golden-manifest:
    name: Validate Golden Manifest
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: PythonDataService
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: PythonDataService/requirements*.txt
      - run: pip install pydantic jsonschema pyarrow pytest
      - run: python -m pytest tests/fixtures/test_golden_manifest.py -v --tb=short --noconftest
