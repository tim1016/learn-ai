<div class="research-lab">
  <app-page-header
    [title]="title()"
    [subtitle]="subtitle()"
    [hasTabs]="true"
  />

  <nav class="rl-subnav" role="navigation" aria-label="Research Lab sections">
    @for (group of groups; track group.label; let last = $last) {
      <div class="rl-subnav-group">
        <span class="rl-subnav-eyebrow">{{ group.label }}</span>
        @for (item of group.items; track item.path) {
          <a
            class="rl-subnav-tab"
            [routerLink]="item.path"
            routerLinkActive="active"
          >
            {{ item.label }}
          </a>
        }
        @if (!last) {
          <span class="rl-subnav-divider" aria-hidden="true"></span>
        }
      </div>
    }
  </nav>

  <div class="rl-panel">
    <router-outlet />
  </div>
</div>
