<div class="chart-wrapper">
  <!-- Quality bar -->
  @if (quality(); as q) {
    <div class="timeframe-bar">
      <div class="quality-info">
        <span class="quality-badge">{{ q.resampled_bar_count }} bars</span>
        @if (q.gaps_found > 0) {
          <span class="quality-warn">{{ q.gaps_found }} gaps</span>
        }
      </div>
      <button class="quality-toggle" (click)="toggleQuality()" [title]="'Data quality report'">
        <i class="pi pi-chart-bar"></i>
        Quality Report
      </button>
    </div>
  }

  <!-- Quality details modal -->
  @if (qualityModalOpen() && quality(); as q) {
    <app-quality-modal [quality]="q" (closed)="toggleQuality()" />
  }

  <!-- Indicator visibility toolbar -->
  @if (hasIndicators) {
    <div class="indicator-toolbar">
      <div class="indicator-toolbar-row">
        <span class="toolbar-label">Indicators</span>
        <div class="indicator-chips">
          @for (chip of indicatorChips(); track chip.id) {
            <button
              class="ind-chip"
              [class.hidden]="!chip.visible"
              [title]="chip.id"
              (click)="toggleIndicatorVisibility(chip.id)">
              <span class="chip-dot" [style.background]="chip.visible ? chip.color : '#cbd5e1'"></span>
              <span class="chip-label">{{ chip.id }}</span>
              <i class="pi" [class.pi-eye]="chip.visible" [class.pi-eye-slash]="!chip.visible"></i>
            </button>
          }
        </div>
        <div class="toolbar-actions">
          <button class="toolbar-btn" (click)="toggleAllIndicators(true)" title="Show all">
            <i class="pi pi-eye"></i>
          </button>
          <button class="toolbar-btn" (click)="toggleAllIndicators(false)" title="Hide all">
            <i class="pi pi-eye-slash"></i>
          </button>
        </div>
      </div>
    </div>
  }

  <!-- Main chart area -->
  <div class="main-chart-area">
    @if (!hasData() ) {
      <div class="chart-empty">
        <i class="pi pi-chart-line"></i>
        <p>Run a backtest to see the chart</p>
      </div>
    }

    <div #mainChart class="main-chart-container" [style.display]="hasData() ? 'block' : 'none'"></div>
  </div>

  <!-- Sub-panels host -->
  <div #subPanelHost class="sub-panels-host"></div>
</div>
