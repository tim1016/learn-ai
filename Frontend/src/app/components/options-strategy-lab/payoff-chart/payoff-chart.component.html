<div class="payoff-chart-wrapper">
  @if (hasData()) {
    <div class="chart-legend">
      <span class="legend-item">
        <span class="legend-swatch exp"></span>
        Expiration P&L
      </span>
      @if (currentPnlCurve().length) {
        <span class="legend-item">
          <span class="legend-swatch curr"></span>
          Current P&L
        </span>
      }
      @if (greekCurve().length) {
        <span class="legend-item">
          <span class="legend-swatch greek"></span>
          {{ selectedGreek() | titlecase }}
        </span>
      }
    </div>
  }

  <div class="chart-outer" [style.height.px]="height()">
    <div #chartContainer class="chart-canvas"></div>
    <div #tooltip class="chart-tooltip"></div>

    @if (!hasData()) {
      <div class="empty-overlay">
        <i class="pi pi-chart-line"></i>
        <p>Configure a strategy to see the payoff diagram</p>
      </div>
    }
  </div>
</div>
