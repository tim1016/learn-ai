<!-- eslint-disable @angular-eslint/template/click-events-have-key-events, @angular-eslint/template/interactive-supports-focus -->
<div class="transport">
  <div class="transport-left">
    <button type="button" class="tb" (click)="stepBack()"
      pTooltip="Step back one bar" tooltipPosition="top"
      aria-label="Step back">◁</button>

    <button type="button" class="tb play" (click)="togglePlay()"
      [class.playing]="isPlaying()"
      [pTooltip]="isPlaying() ? 'Pause playback' : 'Play'"
      tooltipPosition="top"
      aria-label="Play / Pause">
      @if (isPlaying()) { ‖ } @else { ▶ }
    </button>

    <button type="button" class="tb" (click)="stepFwd()"
      pTooltip="Step forward one bar" tooltipPosition="top"
      aria-label="Step forward">▷</button>
  </div>

  <div class="transport-mid">
    <button type="button" class="dir-toggle" (click)="toggleDirection()"
      [class.reverse]="!isForward()"
      [pTooltip]="isForward() ? 'Playback direction: forward. Click to reverse.' : 'Playback direction: reverse. Click to go forward.'"
      tooltipPosition="top"
      aria-label="Toggle direction">
      <span class="dir-icon">{{ directionLabel(svc.direction()) }}</span>
      <span class="dir-label">{{ isForward() ? 'FWD' : 'REV' }}</span>
    </button>

    <div class="pill-group" role="group" aria-label="Playback speed">
      <span class="group-label">SPEED</span>
      <div class="pills">
        @for (s of speeds; track s) {
          <button type="button" class="speed-btn"
            [class.active]="svc.playbackSpeed() === s"
            (click)="setSpeed(s)"
            [pTooltip]="'Play at ' + s + '× speed (' + (100 / s) + 'ms per bar)'"
            tooltipPosition="top">
            {{ s }}×
          </button>
        }
      </div>
    </div>

    <div class="pill-group" role="group" aria-label="Visible window size">
      <span class="group-label">WINDOW</span>
      <div class="pills">
        @for (opt of windowOptions; track opt[0]) {
          <button type="button" class="window-btn"
            [class.active]="svc.windowSize() === opt[1]"
            (click)="setWindow(opt[1])"
            [pTooltip]="opt[1] === 'all' ? 'Show the entire timeline at once' : 'Show the last ' + opt[0] + ' bars around the playhead'"
            tooltipPosition="top">
            {{ opt[0] }}
          </button>
        }
      </div>
    </div>
  </div>

  <div class="transport-right">
    <div class="time-readout">
      <span class="time">
        @if (currentTime(); as t) { {{ t | date:'MMM d, HH:mm' }} } @else { — }
      </span>
      <span class="idx">{{ indexLabel() }}</span>
    </div>
  </div>
</div>

<div class="minimap" #minimap (click)="onMinimapClick($event)"
  pTooltip="Click anywhere to scrub the playhead there" tooltipPosition="bottom">
  <div class="minimap-track"></div>
  <div class="minimap-window"
    [style.left.%]="windowBracket().leftPct"
    [style.width.%]="windowBracket().widthPct"></div>
  @for (pip of tradePips(); track $index) {
    <div class="minimap-pip" [class.win]="pip.kind === 'win'" [class.loss]="pip.kind === 'loss'"
      [style.left.%]="pip.xPct"></div>
  }
  <div class="minimap-cursor" [style.left.%]="cursorPct()"></div>
</div>
