@if (hasData() || hasEquity()) {
  <div class="chart-wrapper">
    <!-- Price chart -->
    <div class="chart-panel" [style.display]="hasData() ? 'block' : 'none'">
      <div class="chart-panel__label">Price chart</div>
      <div #priceChart class="chart-container"></div>
    </div>

    <!-- Equity curve -->
    <div class="chart-panel" [style.display]="hasEquity() ? 'block' : 'none'">
      <div class="chart-panel__label">Equity curve</div>
      <div #equityChart class="chart-container equity-container"></div>
    </div>
  </div>
} @else {
  <div class="chart-empty">
    <span class="empty-icon">📊</span>
    <p>Run a backtest to see the price chart and equity curve.</p>
  </div>
}
