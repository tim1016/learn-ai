<section class="start-stop" aria-label="Start / stop run">
  <header class="head">
    <h2>Run process</h2>
    <span class="proc" [class.live]="isLive()">{{ status().process.state }}</span>
  </header>

  <div class="fields">
    <label class="field">
      <span>Strategy</span>
      <input
        type="text"
        [value]="strategy()"
        (input)="setStrategy($event)"
        [disabled]="isLive()"
        autocomplete="off"
        spellcheck="false"
      />
    </label>

    <label class="field checkbox">
      <input type="checkbox" [checked]="readonlyFlag()" (change)="setReadonly($event)" [disabled]="isLive()" />
      <span>Read-only (no live order submission)</span>
    </label>

    <label class="field">
      <span>Hydrate policy</span>
      <select [value]="hydratePolicy()" (change)="setHydratePolicy($event)" [disabled]="isLive()">
        <option value="require">require</option>
        <option value="optional">optional</option>
        <option value="disabled">disabled</option>
      </select>
    </label>

    <label class="field">
      <span>Max orders / day</span>
      <input
        type="number"
        min="0"
        max="100"
        [value]="maxOrdersPerDay()"
        (input)="setMaxOrdersPerDay($event)"
        [disabled]="isLive()"
      />
    </label>

    <label class="field">
      <span>IBKR host</span>
      <input type="text" [value]="ibkrHost()" (input)="setIbkrHost($event)" [disabled]="isLive()" autocomplete="off" />
    </label>
  </div>

  <div class="actions" role="group" aria-label="Run controls">
    <button type="button" class="primary" (click)="start()" [disabled]="!canStart()">Start</button>
    <button type="button" class="danger" (click)="stop()" [disabled]="!canStop()">Stop</button>
    @if (runId(); as rid) {
      <span class="target mono">→ {{ rid }}</span>
    }
  </div>

  @let reason = startBlockedReason();
  @if (reason) {
    <p class="disabled-reason" role="status">{{ reason }}</p>
  }

  <app-broker-operation-result [error]="result()" />
</section>
