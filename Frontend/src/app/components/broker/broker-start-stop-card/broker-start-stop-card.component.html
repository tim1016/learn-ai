<section class="start-stop card-shell" aria-label="Bot controls and settings">
  <header class="head">
    <div>
      <h2>Bot Configuration</h2>
      <p>Settings used when this bot starts.</p>
    </div>
    <span class="proc" [class.live]="isLive()">{{ isLive() ? 'RUNNING' : 'STOPPED' }}</span>
  </header>

  <div class="fields">
    <label class="field">
      <span>Strategy</span>
      <small>The algorithm your bot will follow.</small>
      <input
        type="text"
        [value]="strategy()"
        (input)="setStrategy($event)"
        [disabled]="isLive()"
        autocomplete="off"
        spellcheck="false"
      />
    </label>

    <label class="field checkbox">
      <input type="checkbox" [checked]="readonlyFlag()" (change)="setReadonly($event)" [disabled]="isLive()" />
      <span>Shadow mode (suppress orders)</span>
      @if (readonlyFlag()) {
        <strong class="paper-chip live">ON - observing only, no orders placed</strong>
      } @else {
        <strong class="paper-chip warn">OFF - orders will be placed</strong>
      }
    </label>

    <label class="field">
      <span>Indicator state hydration</span>
      <small>Replays prior session bars so indicators (EMA, RSI, etc.) warm up before the bot starts emitting signals. This is distinct from backtest bar loading; the runner replays the local session window only.</small>
      <select [value]="hydratePolicy()" (change)="setHydratePolicy($event)" [disabled]="isLive()">
        <option value="require">Always restore prior session state (recommended)</option>
        <option value="optional">Try to restore prior session state, start anyway if unavailable</option>
        <option value="disabled">Skip hydration (advanced)</option>
      </select>
    </label>

    <label class="field">
      <span>Max orders / day</span>
      <small>Safety cap - bot won't place more than this many trades per day.</small>
      <input
        type="number"
        min="0"
        max="100000"
        [value]="maxOrdersPerDay()"
        (input)="setMaxOrdersPerDay($event)"
        [disabled]="isLive()"
      />
    </label>

    <label class="field">
      <span>Broker Connection Address</span>
      <small>Leave as 127.0.0.1 if running locally.</small>
      <input type="text" [value]="ibkrHost()" (input)="setIbkrHost($event)" [disabled]="isLive()" autocomplete="off" />
    </label>
  </div>

  <div class="controls">
    <h2>Run Your Bot</h2>
    <button
      type="button"
      class="primary"
      (click)="start()"
      [disabled]="!canStart()"
      [title]="startBlockedReason() ?? 'Start the bot with the settings above.'"
    >
      <i class="pi pi-play" aria-hidden="true"></i>
      <span>Start Trading</span>
    </button>
    <button
      type="button"
      class="danger"
      (click)="stop()"
      [disabled]="!canStop()"
      title="Stop all trading activity for this bot."
    >
      <i class="pi pi-stop" aria-hidden="true"></i>
      <span>Stop Bot</span>
    </button>
    @if (runId(); as rid) {
      <details class="session-detail">
        <summary>Last session ID: {{ rid.length > 12 ? rid.slice(0, 8) + '...' : rid }}</summary>
        <span class="mono">{{ rid }}</span>
      </details>
    }
  </div>

  @let reason = startBlockedReason();
  @if (reason) {
    <p class="disabled-reason" role="status">{{ reason }}</p>
  }

  <app-broker-operation-result [error]="result()" />
</section>
