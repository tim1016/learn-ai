<label class="account-switcher">
  <span>Viewing account</span>
  <select [value]="accountId()" aria-label="Account" (change)="choose($event)">
    <option [value]="accountId()">{{ accountId() }}</option>
    @for (row of directory.rosterRows(); track row.account_id) {
      @if (row.account_id !== accountId()) {
        <option [value]="row.account_id">{{ row.account_id }}</option>
      }
    }
  </select>
</label>
@if (directory.rosterShowingStaleLastGood()) {
  <span class="state state-stale">Account list may be stale.</span>
} @else if (directory.rosterErrorMessage()) {
  <span class="state state-error">Account list is unavailable.</span>
}
