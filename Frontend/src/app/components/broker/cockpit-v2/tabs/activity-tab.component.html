<div class="activity-tab" data-testid="activity-tab">
  <section class="subsection" data-testid="activity-latest-signal" aria-label="Latest signal">
    <h3>Latest signal</h3>
    <app-latest-signal-strip
      [decisionColumns]="status().decision_columns"
      [latestDecision]="status().latest_decision"
    />
  </section>

  <section class="subsection" data-testid="activity-trade-chart" aria-label="Trade chart">
    <h3>Trade chart</h3>
    <app-bot-trade-chart-card
      [strategyInstanceId]="status().strategy_instance_id"
      [symbol]="status().symbol"
      [activity]="activity()"
      (selectionChange)="onChartSelectionChange($event)"
    />
  </section>

  @if (ordersToday().length > 0) {
    <section class="subsection" data-testid="activity-orders-today" aria-label="Orders Today">
      <app-working-pending-orders-section [orders]="ordersToday()" />
    </section>
  }

  <section class="subsection" data-testid="activity-broker-activity" aria-label="Broker activity">
    <app-broker-activity-table
      [rows]="[]"
      [eventRows]="brokerEventRows()"
      [backfillLoading]="backfillLoading()"
      [backfillError]="backfillError()"
      [sseStatus]="sseStatus()"
      [sseError]="sseError()"
      [activityHealth]="activityHealth()"
    />
  </section>

  <section class="subsection" data-testid="activity-incidents" aria-label="Incidents">
    <h3>Incidents</h3>
    <app-incidents-panel [runId]="chartRunId()" />
  </section>
</div>
