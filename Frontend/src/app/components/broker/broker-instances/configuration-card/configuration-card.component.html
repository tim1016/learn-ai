@if (hasConfiguration()) {
  <section class="card configuration-card" aria-labelledby="configuration-heading">
    <div class="card-head">
      <div class="card-label" id="configuration-heading">CONFIGURATION</div>
      <div class="card-summary">
        <span class="strong" data-testid="configuration-strategy">{{ strategyName() }}</span>
        <span class="sep" aria-hidden="true">·</span>
        <span class="meta">
          Sizing
          <span class="strong" data-testid="configuration-sizing">{{ sizingLabel() }}</span>
        </span>
      </div>
      <div class="card-actions">
        @if (canRedeploy()) {
          <a
            class="btn-ghost btn-ghost--accent"
            routerLink="/broker/deploy"
            [queryParams]="redeployQueryParams()"
            data-testid="configuration-edit"
          >
            REDEPLOY
          </a>
        } @else {
          <span class="edit-disabled" data-testid="configuration-edit-disabled">
            Edit available after stop
          </span>
        }
      </div>
    </div>
  </section>
} @else {
  <section class="card configuration-card empty" data-testid="configuration-empty">
    <div class="card-head">
      <div class="card-label">CONFIGURATION</div>
      <div class="card-summary muted">No strategy configured.</div>
      <div class="card-actions">
        <a
          class="btn-ghost btn-ghost--accent"
          routerLink="/broker/deploy"
          [queryParams]="redeployQueryParams()"
          data-testid="configuration-cta"
        >
          Configure to trade
        </a>
      </div>
    </div>
  </section>
}
