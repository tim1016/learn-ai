@if (hasConfiguration()) {
  <section class="card configuration-card" aria-labelledby="configuration-heading">
    <header class="card-header">
      <h2 id="configuration-heading">Configuration</h2>
      @if (canRedeploy()) {
        <a
          class="edit"
          routerLink="/broker/deploy"
          [queryParams]="redeployQueryParams()"
          data-testid="configuration-edit"
        >
          Edit
        </a>
      } @else {
        <span class="edit-disabled" data-testid="configuration-edit-disabled">
          Edit available after stop
        </span>
      }
    </header>
    <dl class="rows">
      <div class="row">
        <dt>Strategy</dt>
        <dd data-testid="configuration-strategy">{{ strategyName() }}</dd>
      </div>
      <div class="row">
        <dt>Sizing</dt>
        <dd data-testid="configuration-sizing">{{ sizingLabel() }}</dd>
      </div>
    </dl>
  </section>
} @else {
  <section class="card configuration-card empty" data-testid="configuration-empty">
    <p>No strategy configured.</p>
    <a
      class="cta"
      routerLink="/broker/deploy"
      [queryParams]="redeployQueryParams()"
      data-testid="configuration-edit"
    >
      Configure to trade
    </a>
  </section>
}
