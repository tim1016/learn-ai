@if (fabVisible()) {
  <button
    type="button"
    class="fab"
    (click)="toggleOpen()"
    data-testid="pre-trade-fab"
    [attr.aria-label]="open() ? 'Close pre-trade checklist' : 'Open pre-trade checklist'"
    [attr.aria-expanded]="open()"
  >
    <i class="pi pi-list" aria-hidden="true"></i>
    <span>Pre-trade checklist</span>
    @if (failingGates().length) {
      <span class="badge">{{ failingGates().length }}</span>
    }
  </button>
}

@if (open()) {
  <aside
    #dialogEl
    class="dialog"
    role="dialog"
    aria-modal="false"
    aria-labelledby="pre-trade-dialog-heading"
    data-testid="pre-trade-dialog"
    tabindex="-1"
    (keydown.escape)="close()"
  >
    <header class="dialog-header">
      <h3 id="pre-trade-dialog-heading">Pre-trade checklist</h3>
      <button
        type="button"
        class="close"
        (click)="close()"
        data-testid="pre-trade-close"
        aria-label="Close pre-trade checklist"
      >
        <i class="pi pi-times" aria-hidden="true"></i>
      </button>
    </header>
    @if (failingGates().length) {
      <ul class="items">
        @for (g of failingGates(); track g.key) {
          <li class="item" [class.acknowledged]="acknowledged().has(g.key)">
            <div class="item-body">
              <strong>{{ g.label }}</strong>
              <p class="detail">{{ g.detail }}</p>
            </div>
            <button
              type="button"
              class="ack"
              (click)="acknowledge(g.key)"
              [disabled]="acknowledged().has(g.key)"
              [attr.data-testid]="'pre-trade-ack-' + g.key"
            >
              {{ acknowledged().has(g.key) ? 'Acknowledged' : 'Acknowledge' }}
            </button>
          </li>
        }
      </ul>
    } @else {
      <p class="empty">All gates pass — nothing to triage.</p>
    }
  </aside>
}
