@let intent = intentLabel();
<section
  class="cockpit-banner"
  role="region"
  aria-label="Bot status and controls"
  data-testid="sticky-control-bar"
  [attr.data-attention]="attentionState()"
>
  <div class="bot-id">
    <div class="name" [title]="botName()" data-testid="bot-name">{{ botName() }}</div>
    <div class="sid">strategy_instance_id · {{ botName() }}</div>
  </div>

  <div class="pills-row" role="status" aria-live="polite">
    <span
      class="pill fleet-state-pill"
      [attr.data-state]="fleetState()"
      [attr.data-verdict]="fleetVerdict()"
      data-testid="cockpit-fleet-state-pill"
    >
      <span class="dot" aria-hidden="true"></span>
      <span class="key">FLEET</span>
      {{ fleetState() }}
    </span>

    <span class="pill" [attr.data-tone]="processTone()">
      <span class="dot" aria-hidden="true"></span>
      <span class="key">STATE</span>
      {{ processLabel() }}
    </span>

    @if (intent) {
      <span class="pill" [attr.data-tone]="intentTone()">
        <span class="key">INTENT</span>
        {{ intent }}
      </span>
    }

    <span class="pill-divider" aria-hidden="true"></span>

    @if (isPaper()) {
      <span
        class="pill"
        [attr.data-verdict]="safetyVerdict()"
        data-testid="paper-pill"
      >
        <span class="key">SAFETY</span>
        {{ safetyLabel() }}
      </span>
    }

    <span class="pill prior-run" [attr.data-priorrun]="priorRun()">
      {{ priorRunLabel() }}
    </span>

    @if (hasPoisonFlag()) {
      <span class="pill" data-verdict="unsafe" data-testid="poison-chip" title="Run flagged unsafe">
        POISONED
      </span>
    }
  </div>

  <div class="toolbar" role="toolbar" aria-label="Operator actions">
    <button
      type="button"
      class="keycap"
      (click)="onJumpToControlsClick()"
      data-testid="jump-to-controls"
      aria-label="Scroll to Start / Pause / Stop controls"
    >
      <i class="pi pi-arrow-down" aria-hidden="true"></i>
      <span>CONTROLS</span>
    </button>
    <span class="divider" aria-hidden="true"></span>
    <button
      type="button"
      class="keycap keycap--kebab"
      disabled
      aria-label="More actions — coming with #584"
      title="More actions — wire-up tracked in #584"
    >
      ⋯
    </button>
  </div>

  <div class="banner-attention" aria-hidden="true"></div>
</section>
