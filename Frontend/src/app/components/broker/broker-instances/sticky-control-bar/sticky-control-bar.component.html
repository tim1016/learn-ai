@let intent = intentLabel();
@let priorRunText = priorRunLabel();
<section
  class="cockpit-banner"
  role="region"
  aria-label="Bot status and controls"
  data-testid="sticky-control-bar"
  [attr.data-attention]="fleetVerdict()"
>
  <div class="bot-id">
    <div class="name" [title]="botName()" data-testid="bot-name">{{ botName() }}</div>
    <div class="sid" data-testid="strategy-key-line">{{ strategyKey() }}</div>
  </div>

  <div class="pills-row" role="status" aria-live="polite">
    <span
      class="pill fleet-state-pill"
      [attr.data-state]="fleetState()"
      [attr.data-verdict]="fleetVerdict()"
      data-testid="cockpit-fleet-state-pill"
    >
      <span class="dot" aria-hidden="true"></span>
      <span class="key">FLEET</span>
      {{ fleetState() }}
    </span>

    <span class="pill" [attr.data-tone]="processTone()">
      <span class="dot" aria-hidden="true"></span>
      <span class="key">STATE</span>
      {{ processLabel() }}
    </span>

    @if (intent) {
      <span class="pill" [attr.data-tone]="intentTone()">
        <span class="key">INTENT</span>
        {{ intent }}
      </span>
    }

    <span class="pill-divider" aria-hidden="true"></span>

    <span
      class="pill"
      [attr.data-verdict]="safetyVerdict()"
      data-testid="paper-pill"
      [title]="'Broker safety verdict — ' + safetyLabel()"
    >
      <span class="key">SAFETY</span>
      {{ safetyLabel() }}
    </span>

    @if (priorRunText) {
      <span class="pill prior-run" [attr.data-priorrun]="priorRun()">
        {{ priorRunText }}
      </span>
    }

    @if (hasPoisonFlag()) {
      <span class="pill" data-verdict="unsafe" data-testid="poison-chip" title="Run flagged unsafe">
        POISONED
      </span>
    }
  </div>

  <div class="toolbar" role="toolbar" aria-label="Operator actions">
    <button
      type="button"
      class="keycap"
      [disabled]="resumeDisabled()"
      (click)="onResumeClick()"
      data-testid="banner-resume-keycap"
      [attr.aria-label]="resumeLabel()"
      [title]="resumeTooltip()"
    >
      <i class="pi pi-play" aria-hidden="true"></i>
      <span>{{ resumeLabel() }}</span>
    </button>
    <button
      type="button"
      class="keycap"
      [disabled]="pauseDisabled()"
      (click)="onPauseClick()"
      data-testid="banner-pause-keycap"
      [attr.aria-label]="pauseLabel()"
      [title]="pauseTooltip()"
    >
      <i class="pi pi-pause" aria-hidden="true"></i>
      <span>{{ pauseLabel() }}</span>
    </button>
    <button
      type="button"
      class="keycap keycap--panic"
      [disabled]="flattenDisabled()"
      (click)="onFlattenClick()"
      data-testid="banner-flatten-keycap"
      aria-label="Flatten and pause"
      [title]="flattenTooltip()"
    >
      <i class="pi pi-stop-circle" aria-hidden="true"></i>
      <span>Flatten + pause</span>
    </button>
    <span class="divider" aria-hidden="true"></span>
    <button
      type="button"
      class="keycap"
      (click)="onJumpToControlsClick()"
      data-testid="jump-to-controls"
      aria-label="Scroll to Start / Pause / Stop controls"
    >
      <i class="pi pi-arrow-down" aria-hidden="true"></i>
      <span>CONTROLS</span>
    </button>
  </div>

  <div class="banner-attention" aria-hidden="true"></div>
</section>
