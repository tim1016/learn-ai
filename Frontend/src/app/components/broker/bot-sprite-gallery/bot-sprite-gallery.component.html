<section class="sprite-page">
  <header class="page-header">
    <div>
      <p class="eyebrow">Design lab</p>
      <h1>Swordsman sprite states</h1>
      <p class="lede">
        Repo-owned pixel bot studies rendered as stepped CSS sprite animations.
      </p>
    </div>

    <div class="controls" aria-label="Sprite animation controls">
      <div class="control-group" aria-label="Level">
        @for (level of levels; track level) {
          <button
            type="button"
            class="segmented-button"
            [class.active]="selectedLevel() === level"
            [attr.aria-pressed]="selectedLevel() === level"
            (click)="selectLevel(level)"
          >
            L{{ level }}
          </button>
        }
      </div>

      <div class="control-group" aria-label="Facing">
        @for (facing of facings; track facing.id) {
          <button
            type="button"
            class="segmented-button"
            [class.active]="selectedFacing().id === facing.id"
            [attr.aria-pressed]="selectedFacing().id === facing.id"
            (click)="selectFacing(facing)"
          >
            {{ facing.label }}
          </button>
        }
      </div>
    </div>
  </header>

  <div class="sprite-grid" aria-live="polite">
    @for (sprite of spriteCards(); track sprite.id) {
      <article class="sprite-card">
        <div class="sprite-stage" [attr.aria-label]="sprite.label + ' animation'">
          <div
            class="sprite"
            [attr.data-state]="sprite.id"
            [attr.data-facing]="sprite.facingId"
            [attr.data-level]="sprite.level"
            [style.--sprite-primary]="sprite.primaryColor"
            [style.--sprite-accent]="sprite.accentColor"
            [style.--sprite-trim]="sprite.trimColor"
            [style.--frame-count]="sprite.frames"
            [style.--duration.ms]="sprite.durationMs"
          ></div>
        </div>

        <div class="sprite-meta">
          <h2>{{ sprite.label }}</h2>
          <span>{{ sprite.frames }} frames</span>
        </div>
      </article>
    }
  </div>
</section>
