<div class="procedure-grid">
  @for (procedure of procedures; track procedure.id) {
    <details
      class="procedure-card"
      [class.tone-go]="procedure.tone === 'go'"
      [class.tone-calm]="procedure.tone === 'calm'"
      [class.tone-recover]="procedure.tone === 'recover'"
      [class.tone-scale]="procedure.tone === 'scale'"
      [open]="procedure.featured"
    >
      <summary>
        <span class="procedure-icon"><i [class]="procedure.icon" aria-hidden="true"></i></span>
        <span class="procedure-heading">
          <span class="procedure-eyebrow">{{ procedure.eyebrow }}</span>
          <strong>{{ procedure.title }}</strong>
          <span>{{ procedure.summary }}</span>
        </span>
        <i class="pi pi-chevron-down procedure-chevron" aria-hidden="true"></i>
      </summary>
      <div class="procedure-body">
        <ol>
          @for (step of procedure.steps; track $index) {
            <li>
              <span class="step-number mono">{{ $index + 1 }}</span>
              <span>{{ step }}</span>
            </li>
          }
        </ol>
        <div class="procedure-actions">
          <a [routerLink]="procedure.route">
            {{ procedure.routeLabel }} <i class="pi pi-arrow-right" aria-hidden="true"></i>
          </a>
          <a [routerLink]="['/broker/bot-manual']" [fragment]="procedure.manualAnchor">Read the rules</a>
        </div>
      </div>
    </details>
  }
</div>
