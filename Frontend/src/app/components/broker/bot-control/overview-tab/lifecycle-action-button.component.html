<span
  class="chart-action-shell"
  [attr.title]="tooltip()"
  (mouseenter)="hoverAction(true)"
  (mouseleave)="hoverAction(false)"
  (focusin)="hoverAction(true)"
  (focusout)="hoverAction(false)"
>
  <button
    type="button"
    class="chart-action"
    [class.tone-primary]="action().tone === 'primary'"
    [class.tone-danger]="action().tone === 'danger'"
    [class.is-disabled]="isDisabled()"
    [class.is-on]="isOn()"
    [class.is-off]="isOff()"
    [disabled]="isDisabled()"
    [attr.aria-disabled]="isDisabled()"
    [attr.aria-label]="displayLabel()"
    (click)="activateAction()"
  >
    <i [class]="iconClass()" aria-hidden="true"></i>
    <span>{{ displayLabel() }}</span>
  </button>
</span>
