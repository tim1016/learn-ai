<section class="action-panel" aria-label="Lifecycle controls">
  <header>
    <p class="eyebrow">Controls</p>
    <h3>Lifecycle controls</h3>
  </header>

  @if (onlyFreshRunAvailable()) {
    <div class="fresh-run-only" role="status" data-testid="fresh-run-only-notice">
      <strong>Only Fresh run is available</strong>
      <span>Live controls are locked for this run.</span>
    </div>
  }

  <div class="action-groups">
    @for (group of actionGroups(); track trackGroup($index, group)) {
      <div class="action-group" [class.danger-group]="group.id === 'danger'">
        <span class="group-label">{{ group.label }}</span>
        <div class="action-list" [attr.aria-label]="group.ariaLabel">
          @for (action of group.actions; track trackAction($index, action)) {
            <app-lifecycle-action-button
              [action]="action"
              [busyAction]="busyAction()"
              (actionInvoked)="actionInvoked.emit($event)"
              (disabledActionSelected)="disabledActionSelected.emit($event)"
              (actionTargetHovered)="actionTargetHovered.emit($event)"
            />
          }
        </div>
      </div>
    }
  </div>
</section>
