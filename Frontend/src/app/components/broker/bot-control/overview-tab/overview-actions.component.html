<section class="action-panel" aria-label="Act now">
  <header>
    <p class="eyebrow">Act now</p>
    <h3>Lifecycle controls</h3>
  </header>

  <div class="action-groups">
    <div class="action-list emergency-actions" aria-label="Emergency lifecycle controls">
      @for (action of emergencyActions(); track trackAction($index, action)) {
        <app-lifecycle-action-button
          [action]="action"
          [busyAction]="busyAction()"
          (actionInvoked)="actionInvoked.emit($event)"
          (disabledActionSelected)="disabledActionSelected.emit($event)"
          (actionTargetHovered)="actionTargetHovered.emit($event)"
        />
      }
    </div>

    @if (redeployAction(); as action) {
      <app-lifecycle-action-button
        class="redeploy-action"
        [action]="action"
        [busyAction]="busyAction()"
        (actionInvoked)="actionInvoked.emit($event)"
        (disabledActionSelected)="disabledActionSelected.emit($event)"
        (actionTargetHovered)="actionTargetHovered.emit($event)"
      />
    }

    @if (overflowActions().length > 0) {
      <details class="overflow-menu">
        <summary aria-label="More lifecycle actions">More</summary>
        <div class="overflow-list">
          @for (action of overflowActions(); track trackAction($index, action)) {
            <app-lifecycle-action-button
              [action]="action"
              [busyAction]="busyAction()"
              enabledCaption="Typed confirmation required"
              (actionInvoked)="actionInvoked.emit($event)"
              (disabledActionSelected)="disabledActionSelected.emit($event)"
              (actionTargetHovered)="actionTargetHovered.emit($event)"
            />
          }
        </div>
      </details>
    }
  </div>
</section>
