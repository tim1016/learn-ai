<details class="context-receipts" data-testid="bot-control-node-receipts">
  <summary>Technical proof details</summary>
  <ul>
    @for (receipt of receipts(); track trackNodeReceipt($index, receipt)) {
      <li [attr.title]="receiptDetail(receipt)">
        <span data-receipt>{{ receiptLine(receipt) }}</span>
      </li>
    }
  </ul>
</details>
