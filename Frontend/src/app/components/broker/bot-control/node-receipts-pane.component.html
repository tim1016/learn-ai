<details class="context-receipts" data-testid="bot-control-node-receipts">
  <summary>Node receipts</summary>
  <dl>
    @for (receipt of receipts(); track trackNodeReceipt($index, receipt)) {
      <div>
        <dt>{{ receipt.label }}</dt>
        <dd>
          <span>{{ receipt.value }}{{ receipt.unit ? ' ' + receipt.unit : '' }}</span>
          @if (receipt.source) {
            <small>{{ receipt.source }}</small>
          }
          @if (receiptTimestamp(receipt); as receiptTime) {
            <small>{{ receiptTime }}</small>
          }
        </dd>
      </div>
    }
  </dl>
</details>
