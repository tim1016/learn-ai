<section class="bot-control-page" aria-labelledby="bot-control-title">
  <h1 id="bot-control-title" class="sr-only">Bot control — {{ instanceId() ?? 'bot' }}</h1>

  @if (errorMessage(); as message) {
    <p class="error-banner" role="alert">{{ message }}</p>
  }

  @if (status(); as s) {
    <app-verdict-card
      [status]="s"
      [busy]="busyAction() !== null"
      [renderedRemediation]="renderedPrimaryRemediation()"
      (lifecycleAction)="dispatchOverviewAction($event)"
      (remediationInvoked)="invokePrimaryRemediation()"
      (crashRecoveryRequested)="dispatchCrashRecoveryOverride()"
      (settingsRequested)="onSettingsRequested()"
      (accountMonitorRequested)="openAccountMonitor()"
      (removeRequested)="dispatchRemoveBot()"
    />
  } @else if (!errorMessage()) {
    <p class="loading">Loading bot control...</p>
  }

  <app-typed-halt-confirm
    [open]="typedHaltOpen()"
    heading="Mark this run POISONED"
    [message]="poisonedConfirmMessage"
    (confirmed)="confirmTypedHalt()"
    (cancelled)="closeTypedHalt()"
  />

  <app-typed-halt-confirm
    [open]="crashRecoveryConfirmOpen()"
    heading="Confirm the broker account is flat"
    [message]="crashRecoveryConfirmMessage"
    requiredToken=""
    confirmLabel="Record recovery override"
    (confirmed)="confirmCrashRecoveryOverride()"
    (cancelled)="cancelCrashRecoveryConfirm()"
  />

  <app-typed-halt-confirm
    [open]="retireReplaceConfirmOpen()"
    heading="Retire &amp; Replace"
    [message]="retireReplaceConfirmMessage"
    requiredToken=""
    confirmLabel="Retire &amp; Replace"
    (confirmed)="confirmRetireReplace()"
    (cancelled)="cancelRetireReplaceConfirm()"
  />
</section>
