<div class="activity-tab" data-testid="activity-tab">
  <section class="subsection full-row" data-testid="activity-latest-signal" aria-label="Latest signal">
    <h3>Latest signal</h3>
    <app-latest-signal-strip
      [decisionColumns]="status().decision_columns"
      [latestDecision]="status().latest_decision"
      [signalTone]="status().latest_signal_tone"
    />
  </section>

  <section
    class="subsection chart-panel"
    [class.full-row]="openOrderClusters().length === 0"
    data-testid="activity-trade-chart"
    aria-label="Trade chart"
  >
    <h3>Trade chart</h3>
    <app-bot-trade-chart-card
      [strategyInstanceId]="status().strategy_instance_id"
      [symbol]="status().symbol"
      [activity]="activity()"
      (selectionChange)="onChartSelectionChange($event)"
    />
  </section>

  @if (openOrderClusters().length > 0) {
    <section class="subsection orders-panel" data-testid="activity-orders-today">
      <app-working-pending-orders-section [orders]="openOrderClusters()" />
    </section>
  }

  <section class="subsection full-row" data-testid="activity-broker-activity">
    <app-broker-activity-table
      [rows]="[]"
      [eventSummary]="brokerEventSummary()"
      [backfillLoading]="backfillLoading()"
      [backfillError]="backfillError()"
      [sseStatus]="sseStatus()"
      [sseError]="sseError()"
      [activityHealth]="activityHealth()"
    />
  </section>

  <section class="subsection full-row" data-testid="activity-incidents" aria-label="Incidents">
    <h3>Incidents</h3>
    <app-incidents-panel [runId]="chartRunId()" />
  </section>
</div>
