<section class="lean-script-editor">
  <div class="editor-host" #editorHost></div>

  <div class="problems-panel" aria-live="polite">
    <header class="problems-header">
      <span class="problems-title">Problems</span>
      <span class="problems-counts">
        {{ warningCount() }} warning<span [class.hidden]="warningCount() === 1">s</span>
        @if (linting()) {
          <span class="problems-status">· linting…</span>
        }
      </span>
    </header>

    @if (diagnostics().length === 0) {
      <p class="problems-empty">No problems detected.</p>
    } @else {
      <ul class="problems-list">
        @for (d of diagnostics(); track trackDiagnostic($index, d)) {
          <li class="problems-item">
            <button
              type="button"
              class="problems-button"
              (click)="onDiagnosticClick(d)"
              [attr.aria-label]="'Jump to line ' + d.line"
            >
              <span class="problems-loc">{{ d.line }}:{{ d.col }}</span>
              <span class="problems-rule">{{ d.rule }}</span>
              <span class="problems-message">{{ d.message }}</span>
            </button>
          </li>
        }
      </ul>
    }
  </div>
</section>
