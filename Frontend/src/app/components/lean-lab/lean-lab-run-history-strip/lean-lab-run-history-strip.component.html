<section class="strip" [class.strip--expanded]="isExpanded()">
  <header class="strip__header">
    <div class="strip__summary">
      <span class="strip__label">Run history</span>
      @if (mostRecent(); as row) {
        <span class="strip__meta">
          Last:
          <code class="strip__code">{{ row.leanRunId ?? row.id }}</code>
          · {{ row.strategyName }}
          · {{ row.startDate }} → {{ row.endDate }}
        </span>
      } @else {
        <span class="strip__meta strip__meta--empty">No runs yet</span>
      }
    </div>
    <button
      type="button"
      class="strip__toggle"
      [attr.aria-expanded]="isExpanded()"
      aria-controls="lean-lab-run-history-panel"
      (click)="toggle()"
    >
      {{ isExpanded() ? "Hide history" : "Show history" }} ({{ runCount() }})
    </button>
  </header>

  <div
    id="lean-lab-run-history-panel"
    class="strip__panel"
    [hidden]="!isExpanded()"
  >
    <div class="strip__table-scroll">
      <app-lean-lab-run-history (runSelected)="onRunSelected($event)" />
    </div>
  </div>
</section>
