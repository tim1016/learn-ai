# Ruff linter + formatter configuration
# Docs: https://docs.astral.sh/ruff/configuration/

line-length = 120
target-version = "py312"

[lint]
select = [
    "E",    # pycodestyle errors
    "F",    # pyflakes
    "I",    # isort (import sorting)
    "UP",   # pyupgrade (modernize syntax)
    "B",    # flake8-bugbear (common bugs)
    "SIM",  # flake8-simplify
    "RUF",  # Ruff-specific rules
]
ignore = [
    "E501",   # line too long — handled by formatter
    "E741",   # ambiguous variable name — common in math/finance code (l, O, I)
    "B008",   # do not perform function call in argument defaults — FastAPI Depends() pattern
    "B027",   # empty method without abstract decorator — used for base-class hooks
    "RUF001", # ambiguous unicode character in string — math symbols
    "RUF002", # ambiguous unicode character in docstring — math symbols
    "RUF003", # ambiguous unicode character in comment — math symbols
    "RUF012", # mutable class variables — common in Pydantic models
    "SIM108", # use ternary instead of if-else — readability preference
    "B024",   # abstract base class without abstract methods — used for base-class pattern
    "B904",   # raise-without-from-inside-except — too noisy, revisit later
]

[lint.per-file-ignores]
"tests/**/*.py" = [
    "B011",  # assert False — valid in tests
    "B017",  # assert-raises broad exception — acceptable in tests
]

[lint.isort]
# ``scripts`` is listed explicitly so ruff's isort gives the same answer
# in every environment. Ruff's auto-detection treats a directory as
# first-party iff it sees that directory in the source root — but the
# repo has two ``scripts/`` dirs (at repo root and at ``PythonDataService/``)
# and the source root differs by caller (CI runs from ``PythonDataService/``;
# the data-plane container runs from ``/app/`` which has no ``scripts/``).
# Without this entry, the same file lints clean in the container and
# fails I001 on CI (or vice-versa) depending on the cwd. Explicit
# beats auto-detected.
known-first-party = ["app", "scripts"]

[format]
quote-style = "double"
indent-style = "space"
