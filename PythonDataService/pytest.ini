[pytest]
asyncio_mode = auto
testpaths = tests
pythonpath = .
markers =
    slow: marks tests as slow (training/validation, deselect with '-k "not slow"')
    cross_engine_smoke: marks the four W6mo cross-engine parity cells that run on every PR
filterwarnings =
    ignore:Please use `import python_multipart` instead.:PendingDeprecationWarning:starlette\.formparsers
    ignore:pkg_resources is deprecated as an API.*:UserWarning:polygon\.rest\.base
    ignore:The 'mode\.copy_on_write' option is deprecated.*:pandas.errors.Pandas4Warning:pandas_ta
