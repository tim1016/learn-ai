type Mutation {
  fetchStockAggregates(ticker: String! fromDate: String! toDate: String! timespan: String! = "day" multiplier: Int! = 1): FetchAggregatesResult! @cost(weight: "10")
  sanitizeMarketData(data: [MarketDataRecordInput!]! quantile: Float! = 0.99): SanitizeMarketDataResult! @cost(weight: "10")
  runFeatureResearch(ticker: String! featureName: String! fromDate: String! toDate: String! timespan: String! = "minute" multiplier: Int! = 1): ResearchResultType! @cost(weight: "10")
  runSignalEngine(ticker: String! featureName: String! = "momentum_5m" fromDate: String! = "" toDate: String! = "" flipSign: Boolean! = true regimeGateEnabled: Boolean! = true timespan: String! = "minute" multiplier: Int! = 1 forceRefresh: Boolean! = false): SignalEngineResultType! @cost(weight: "10")
  runOptionsFeatureResearch(ticker: String! featureName: String! fromDate: String! toDate: String! targetType: String! = "directional"): ResearchResultType! @cost(weight: "10")
  runBatchOptionsResearch(featureName: String! tickers: [String!]! fromDate: String! toDate: String! targetType: String! = "directional"): BatchResearchResultType! @cost(weight: "10")
  runRuleBasedBacktest(ticker: String! fromDate: String! toDate: String! multiplier: Int! = 15 timespan: String! = "minute" filterRth: Boolean! = true parametersJson: String! = "{}"): RuleBasedBacktestResultType! @cost(weight: "10")
  createAccount(name: String! type: String! = "Paper" initialCash: Decimal! = 100000): AccountResult! @cost(weight: "10")
  submitOrder(accountId: UUID! tickerId: Int! side: String! orderType: String! = "Market" quantity: Decimal! = 1 limitPrice: Decimal assetType: String! = "Stock" optionContractId: UUID): OrderResult! @cost(weight: "10")
  cancelOrder(orderId: UUID!): OrderResult! @cost(weight: "10")
  fillOrder(orderId: UUID! fillPrice: Decimal! fillQuantity: Decimal! fees: Decimal! = 0 multiplier: Int! = 1): TradeResult! @cost(weight: "10")
  recordTrade(accountId: UUID! symbol: String! side: String! quantity: Decimal! price: Decimal! fees: Decimal! = 0 assetType: String! = "Stock" multiplier: Int! = 1): TradeResult! @cost(weight: "10")
  rebuildPositions(accountId: UUID!): RebuildResult! @cost(weight: "10")
  takePortfolioSnapshot(accountId: UUID!): SnapshotResult! @cost(weight: "10")
  createRiskRule(accountId: UUID! ruleType: String! threshold: Decimal! action: String! = "Warn" severity: String! = "Medium"): RiskRuleResult! @cost(weight: "10")
  updateRiskRule(ruleId: UUID! threshold: Decimal enabled: Boolean action: String severity: String): RiskRuleResult! @cost(weight: "10")
  runScenario(accountId: UUID! prices: [PriceInput!]! priceChangePercent: Decimal ivChangePercent: Decimal timeDaysForward: Int): ScenarioResult! @cost(weight: "10")
  autoFixPortfolio(accountId: UUID!): RebuildResult! @cost(weight: "10")
  linkTradeToStrategy(tradeId: UUID! strategyExecutionId: Int!): LinkResult! @cost(weight: "10")
  importBacktestTrades(strategyExecutionId: Int! accountId: UUID!): ImportResult! @cost(weight: "10")
  runPortfolioValidation: ValidationSuiteResult! @cost(weight: "10")
  saveDataLabSession(input: DataLabSessionInput!): DataLabSessionResult! @cost(weight: "10")
  updateDataLabSession(id: UUID! input: DataLabSessionInput!): DataLabSessionResult! @cost(weight: "10")
  updateDataLabChartSnapshot(id: UUID! chartSnapshotJson: String!): DataLabSessionResult! @cost(weight: "10")
  renameDataLabSession(id: UUID! name: String!): DataLabSessionResult! @cost(weight: "10")
  deleteDataLabSession(id: UUID!): DataLabSessionResult! @cost(weight: "10")
  runSpecStrategyBacktest(specJson: String! startDate: String! endDate: String! initialCash: Decimal! = 100000 fillMode: String! = "signal_bar_close" commissionPerOrder: Decimal! = 0): SpecStrategyBacktestResultType! @cost(weight: "10")
  updateBacktestRunNotes(id: Int! notes: String!): BacktestRunNotesResult! @cost(weight: "10")
}

