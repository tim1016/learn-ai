<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_base.css"><style>
.row{display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin-bottom:10px}
.badge{display:inline-flex;align-items:center;gap:4px;padding:2px 10px;border-radius:9999px;font-size:11px;font-weight:600}
.accent{background:rgba(59,130,246,.15);color:#3b82f6}
.bull{background:rgba(0,200,150,.12);color:#00c896}
.bear{background:rgba(229,51,78,.12);color:#e5334e}
.tag{display:inline-block;padding:2px 7px;border-radius:4px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.06em}
.win{background:rgba(0,200,150,.15);color:#00c896}
.loss{background:rgba(229,51,78,.15);color:#e5334e}
.depr{background:rgba(255,152,0,.15);color:#ff9800}
.sess{background:rgba(245,158,11,.1);border:1px solid rgba(245,158,11,.3);color:#f59e0b;padding:3px 10px;border-radius:4px;font-size:11px;font-weight:700}
.cnt{font-size:10px;font-weight:700;background:#3b82f6;color:#fff;width:18px;height:18px;border-radius:9999px;display:inline-flex;align-items:center;justify-content:center}
</style></head><body><div class="card-root">
<div class="row">
<span class="badge accent"><i class="pi pi-bookmark-fill" style="font-size:10px"></i>SPY · EMA 12/26</span>
<span class="badge bull"><i class="pi pi-check" style="font-size:9px"></i>validated</span>
<span class="badge bear"><i class="pi pi-times" style="font-size:9px"></i>baseline</span>
<span class="cnt">3</span>
</div>
<div class="row" style="margin:0">
<span class="tag win">WIN</span>
<span class="tag loss">LOSS</span>
<span class="tag depr">DEPRECATED</span>
<span class="sess">ACTIVE POSITION</span>
</div>
</div></body></html>
