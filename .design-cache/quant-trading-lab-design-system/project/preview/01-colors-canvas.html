<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_base.css"><style>
.row{display:flex;gap:10px;flex-wrap:wrap}
.sw{width:150px}
.chip{height:64px;border-radius:8px;border:1px solid var(--border)}
.lbl{margin-top:6px;font-size:11px;color:var(--text-secondary);font-family:var(--font-mono)}
.nm{font-size:10px;text-transform:uppercase;letter-spacing:.06em;color:var(--text-muted);margin-top:2px}
</style></head><body><div class="card-root"><div class="row">
<div class="sw"><div class="chip" style="background:#0f1117"></div><div class="lbl">#0F1117</div><div class="nm">bg-canvas</div></div>
<div class="sw"><div class="chip" style="background:#161922"></div><div class="lbl">#161922</div><div class="nm">bg-surface</div></div>
<div class="sw"><div class="chip" style="background:#1c1f2e"></div><div class="lbl">#1C1F2E</div><div class="nm">bg-elevated</div></div>
<div class="sw"><div class="chip" style="background:#232738"></div><div class="lbl">#232738</div><div class="nm">bg-hover</div></div>
<div class="sw"><div class="chip" style="background:#2a2e3e"></div><div class="lbl">#2A2E3E</div><div class="nm">border</div></div>
</div></div></body></html>
