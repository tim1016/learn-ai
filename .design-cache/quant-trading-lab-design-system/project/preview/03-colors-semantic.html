<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_base.css"><style>
.row{display:flex;gap:10px;flex-wrap:wrap}
.sw{width:130px}
.chip{height:56px;border-radius:8px;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:13px}
.soft{margin-top:6px;height:22px;border-radius:6px}
.lbl{margin-top:6px;font-size:11px;color:var(--text-secondary);font-family:var(--font-mono)}
.nm{font-size:10px;text-transform:uppercase;letter-spacing:.06em;color:var(--text-muted);margin-top:2px}
</style></head><body><div class="card-root"><div class="row">
<div class="sw"><div class="chip" style="background:#3b82f6">ACCENT</div><div class="soft" style="background:rgba(59,130,246,.15)"></div><div class="lbl">#3B82F6</div><div class="nm">accent (blue)</div></div>
<div class="sw"><div class="chip" style="background:#00c896;color:#062c22">BULL</div><div class="soft" style="background:rgba(0,200,150,.12)"></div><div class="lbl">#00C896</div><div class="nm">bull / profit</div></div>
<div class="sw"><div class="chip" style="background:#e5334e">BEAR</div><div class="soft" style="background:rgba(229,51,78,.12)"></div><div class="lbl">#E5334E</div><div class="nm">bear / loss</div></div>
<div class="sw"><div class="chip" style="background:#f59e0b;color:#3a2608">WARN</div><div class="soft" style="background:rgba(245,158,11,.12)"></div><div class="lbl">#F59E0B</div><div class="nm">warn / ATM</div></div>
</div></div></body></html>
