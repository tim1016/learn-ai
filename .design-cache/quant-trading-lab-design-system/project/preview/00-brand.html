<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_base.css"><style>
.brand{display:flex;align-items:center;gap:14px}
.glyph{width:44px;height:44px;display:grid;place-items:center;background:var(--bg-surface);border:1px solid var(--border);border-radius:8px}
.glyph svg{display:block}
.wm{font-family:var(--font-mono);font-size:18px;font-weight:700;letter-spacing:-0.01em;color:var(--text-primary)}
.wm .dim{color:var(--text-muted);font-weight:500}
.tag{margin-top:4px;font-size:12px;color:var(--text-secondary)}
.flag{margin-top:14px;font-size:10px;text-transform:uppercase;letter-spacing:.08em;color:var(--warn)}
</style></head><body><div class="card-root">
<div class="brand">
  <div class="glyph"><svg width="22" height="26" viewBox="0 0 22 26"><rect x="9" y="0" width="4" height="26" fill="#5a6178"/><rect x="4" y="5" width="14" height="14" fill="#00c896" rx="1"/></svg></div>
  <div><div class="wm">quant<span class="dim">/</span>lab</div><div class="tag">Options research &amp; backtest workbench</div></div>
</div>
<div class="flag">Placeholder lockup — no logo in source repo</div>
</div></body></html>
