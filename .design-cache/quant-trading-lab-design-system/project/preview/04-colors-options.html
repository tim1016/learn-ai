<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_base.css"><style>
table{border-collapse:collapse;font-family:var(--font-mono);font-size:12px;width:100%}
td,th{padding:6px 10px;border-bottom:1px solid #2a2e3e;text-align:right}
th{font-size:9px;text-transform:uppercase;letter-spacing:.06em;color:#5a6178;font-weight:600;background:#161922;text-align:center}
.call-itm{background:rgba(6,78,59,.45);color:#d1fae5;background-image:repeating-linear-gradient(-45deg,transparent,transparent 4px,rgba(16,185,129,.12) 4px,rgba(16,185,129,.12) 5px)}
.put-itm{background:rgba(127,29,29,.45);color:#fecaca;background-image:repeating-linear-gradient(-45deg,transparent,transparent 4px,rgba(239,68,68,.12) 4px,rgba(239,68,68,.12) 5px)}
.otm{color:#475569}
.atm td{border-top:2px solid rgba(245,158,11,.8);border-bottom:2px solid rgba(245,158,11,.8);background:rgba(245,158,11,.15);color:#fef3c7;font-weight:700}
.strike{color:#e2e8f0}
</style></head><body><div class="card-root"><table>
<tr><th>CALL</th><th>STRIKE</th><th>PUT</th></tr>
<tr><td class="call-itm">12.40</td><td class="strike">430</td><td class="otm">0.85</td></tr>
<tr class="atm"><td>5.20</td><td>442.50</td><td>5.30</td></tr>
<tr><td class="otm">1.10</td><td class="strike">455</td><td class="put-itm">13.60</td></tr>
</table></div></body></html>
