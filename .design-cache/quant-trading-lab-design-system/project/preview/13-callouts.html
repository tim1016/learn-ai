<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_base.css"><style>
.c{display:flex;gap:10px;padding:10px 14px;border-radius:6px;font-size:12px;line-height:1.5;margin-bottom:8px}
.info{background:#eff6ff;border-left:3px solid #2563eb;color:#334155}
.info i{color:#2563eb;margin-top:1px}
.info strong{color:#1e293b;display:block;margin-bottom:2px;font-size:11px}
.warn{background:#fffbeb;border-left:3px solid #d97706;color:#3a2608}
.warn i{color:#d97706}
.err{background:rgba(229,51,78,.12);border-left:3px solid #e5334e;color:#fca5a5}
.dep{display:flex;align-items:flex-start;gap:10px;padding:10px 14px;background:rgba(255,152,0,.08);border:1px solid rgba(255,152,0,.3);border-radius:8px;font-size:12px;color:#e2e8f0}
.dep i{color:#ff9800}
</style></head><body><div class="card-root">
<div class="c info"><i class="pi pi-info-circle"></i><div><strong>Data cached</strong>Next fetch for this range will be instant.</div></div>
<div class="c warn"><i class="pi pi-exclamation-triangle"></i>Minute data is limited to the past 2 years on the Polygon Starter plan.</div>
<div class="dep"><i class="pi pi-exclamation-triangle"></i>This tool is <strong style="margin:0 4px">deprecated</strong>. Use Strategy Validation for new work.</div>
</div></body></html>
