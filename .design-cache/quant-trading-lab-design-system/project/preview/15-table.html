<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_base.css"><style>
.wrap{border:1px solid #2a2e3e;border-radius:8px;overflow:hidden}
table{width:100%;border-collapse:collapse;font-size:12px;font-variant-numeric:tabular-nums}
th{font-size:10px;font-weight:600;color:#5a6178;text-transform:uppercase;background:#161922;border-bottom:2px solid #353a4d;padding:7px 10px;text-align:right;letter-spacing:.04em}
td{padding:7px 10px;border-bottom:1px solid #2a2e3e;text-align:right;color:#8892a8}
td:first-child,th:first-child{text-align:center;width:32px;color:#5a6178}
td:nth-child(2){text-align:left;font-family:var(--font-mono);color:#e2e8f0}
tr.win{background:rgba(0,200,150,.04)}
tr.loss{background:rgba(229,51,78,.04)}
.tag{display:inline-block;padding:2px 7px;border-radius:4px;font-size:9px;font-weight:700;text-transform:uppercase}
.w{background:rgba(0,200,150,.15);color:#00c896}
.l{background:rgba(229,51,78,.15);color:#e5334e}
</style></head><body><div class="card-root"><div class="wrap"><table>
<tr><th>#</th><th>Trade</th><th>Entry</th><th>Exit</th><th>P&amp;L</th><th>Result</th></tr>
<tr class="win"><td>1</td><td>SPY 442C</td><td>441.20</td><td>448.90</td><td style="color:#00c896">+$770</td><td><span class="tag w">Win</span></td></tr>
<tr class="loss"><td>2</td><td>SPY 445P</td><td>443.80</td><td>446.10</td><td style="color:#e5334e">−$230</td><td><span class="tag l">Loss</span></td></tr>
<tr class="win"><td>3</td><td>QQQ 380C</td><td>378.50</td><td>384.20</td><td style="color:#00c896">+$570</td><td><span class="tag w">Win</span></td></tr>
</table></div></div></body></html>
