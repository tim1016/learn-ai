services:
  db:
    image: docker.io/library/postgres:16
    container_name: my-postgres
    restart: always
    environment:
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data:Z
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512M
    networks:
      - app-network

  python-service:
    build: ./PythonDataService
    container_name: polygon-data-service
    restart: always
    ports:
      - "8000:8000"
    volumes:
      - ./PythonDataService/app:/app/app:z
    environment:
      - POLYGON_API_KEY=${POLYGON_API_KEY}
      - FRED_API_KEY=${FRED_API_KEY}
      - HOST=0.0.0.0
      - PORT=8000
      - ALLOWED_ORIGINS=http://backend:8080,http://localhost:5000,http://localhost:4200
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: "2.0"
        reservations:
          memory: 512M
    networks:
      - app-network

  backend:
    image: mcr.microsoft.com/dotnet/sdk:10.0
    container_name: my-backend
    restart: always
    working_dir: /src
    ports:
      - "5000:8080"
    volumes:
      - ./Backend:/src:z
    environment:
      - ConnectionStrings__DefaultConnection=Host=db;Database=postgres;Username=postgres;Password=${POSTGRES_PASSWORD}
      - PolygonService__BaseUrl=http://python-service:8000
      - DOTNET_USE_POLLING_FILE_WATCHER=true
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:8080
    command: ["dotnet", "watch", "run", "--non-interactive"]
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: 1G
    depends_on:
      db:
        condition: service_healthy
      python-service:
        condition: service_healthy
    networks:
      - app-network

volumes:
  pgdata:

networks:
  app-network:
    driver: bridge
