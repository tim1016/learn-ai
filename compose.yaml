services:
  db:
    image: docker.io/library/postgres:16
    container_name: my-postgres
    restart: always
    environment:
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data:Z
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512M
    networks:
      - app-network

  python-service:
    build: ./PythonDataService
    container_name: polygon-data-service
    restart: always
    ports:
      - "8000:8000"
    volumes:
      - ./PythonDataService/app:/app/app:z
      - ../Lean/Data:/lean-data:ro,z
      - ./PythonDataService/lean-cache:/lean-cache:z
      # Divergence study artifacts (dashboard HTML + matrix CSV) live here.
      # Mounted so /research/data-divergence/* can serve host-built files and
      # rebuilds persist across container restarts.
      - ./PythonDataService/cache:/app/cache:z
    environment:
      - POLYGON_API_KEY=${POLYGON_API_KEY}
      - FRED_API_KEY=${FRED_API_KEY}
      - LEAN_DATA_ROOT=/lean-data
      - LEAN_DATA_CACHE=/lean-cache
      - HOST=0.0.0.0
      - PORT=8000
      - ALLOWED_ORIGINS=http://backend:8080,http://localhost:5000,http://localhost:4200
      - BACKEND_URL=http://backend:8080
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: "2.0"
        reservations:
          memory: 512M
    networks:
      - app-network

  backend:
    image: mcr.microsoft.com/dotnet/sdk:10.0
    container_name: my-backend
    restart: always
    working_dir: /src
    ports:
      - "5000:8080"
    volumes:
      - ./Backend:/src:z
    environment:
      - ConnectionStrings__DefaultConnection=Host=db;Database=postgres;Username=postgres;Password=${POSTGRES_PASSWORD}
      - PolygonService__BaseUrl=http://python-service:8000
      - DOTNET_USE_POLLING_FILE_WATCHER=true
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:8080
    command: ["dotnet", "watch", "run", "--non-interactive"]
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: 1G
    depends_on:
      db:
        condition: service_healthy
      python-service:
        condition: service_healthy
    networks:
      - app-network

  frontend:
    build: ./Frontend
    container_name: my-frontend
    restart: always
    ports:
      - "4200:4200"
    volumes:
      - ./Frontend/src:/app/src:z
      - ./Frontend/proxy.conf.json:/app/proxy.conf.json:z
    environment:
      # Angular 21's esbuild compiler runs worker threads; default Node heap
      # caps them at ~512MB which is not enough for this project's bundle
      # (primeng + apollo + chart.js + lightweight-charts + katex). Raise the
      # old-space limit so workers don't hit ERR_WORKER_OUT_OF_MEMORY.
      - NODE_OPTIONS=--max-old-space-size=3584
    command: ["npx", "ng", "serve", "--host", "0.0.0.0", "--poll", "2000", "--proxy-config", "proxy.conf.json"]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4200"]
      interval: 10s
      timeout: 5s
      retries: 3
      # Initial Angular compile on a cold container takes 60–90s; give it
      # room before the first healthcheck fires.
      start_period: 120s
    deploy:
      resources:
        limits:
          memory: 4G
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - app-network

volumes:
  pgdata:

networks:
  app-network:
    driver: bridge
