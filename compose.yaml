services:
  db:
    image: docker.io/library/postgres:16
    container_name: my-postgres
    restart: always
    environment:
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      # Default host exposure is loopback-only; widen deliberately for remote/shared envs.
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
      # Unclean shutdowns trigger WAL fsync recovery before postgres accepts
      # connections — observed up to 40s on this host. With no start_period
      # the healthcheck flips to unhealthy at 25s (5x5s), which strands the
      # backend in Created (depends_on: db.service_healthy) even though
      # postgres recovers a few seconds later. 60s covers the worst case
      # we've seen with margin.
      start_period: 60s
    deploy:
      resources:
        limits:
          memory: 512M
    networks:
      - app-network

  redis:
    image: docker.io/library/redis:7-alpine
    container_name: my-redis
    restart: always
    environment:
      - REDIS_PASSWORD=${REDIS_PASSWORD:-local-dev-redis-password}
    ports:
      # Default host exposure is loopback-only; widen deliberately for remote/shared envs.
      - "127.0.0.1:6379:6379"
    command:
      [
        "redis-server",
        "--appendonly",
        "no",
        "--save",
        "",
        "--requirepass",
        "${REDIS_PASSWORD:-local-dev-redis-password}",
      ]
    healthcheck:
      test: ["CMD-SHELL", "redis-cli --no-auth-warning -a \"$${REDIS_PASSWORD}\" ping | grep PONG"]
      interval: 5s
      # A full `./restart.sh` saturates host CPU/IO, so the `redis-cli`
      # exec can be slow to spawn even though redis answers PONG instantly.
      # One check was killed at the old 3s timeout (5.4s spawn), and with no
      # start_period a dependent's `condition: service_healthy` gave up:
      # "container my-redis is unhealthy". 5s timeout + start_period absorb
      # the cold-rebuild window (redis itself boots in <1s).
      timeout: 5s
      retries: 5
      start_period: 20s
    deploy:
      resources:
        limits:
          memory: 256M
    networks:
      - app-network

  python-service:
    build:
      context: ./PythonDataService
      args:
        GIT_SHA: ${GIT_SHA:-unknown}
    container_name: polygon-data-service
    restart: always
    ports:
      # Default host exposure is loopback-only; widen deliberately for remote/shared envs.
      - "127.0.0.1:8000:8000"
    volumes:
      - ./PythonDataService/app:/app/app:z
      # Development liveness diagnostics: the image can receive GIT_SHA at
      # build time, while the bind-mounted dev service can read HEAD directly.
      - ./.git:/app/.git:ro,z
      # Mount pytest.ini so ad-hoc `podman exec polygon-data-service pytest`
      # picks up `asyncio_mode = auto` without rebuilding the image after
      # local config tweaks. Baked into the image too — see Dockerfile.
      - ./PythonDataService/pytest.ini:/app/pytest.ini:ro,z
      # Ruff config — keep the in-container linter in lockstep with CI
      # (which runs ``ruff check app/ tests/`` from PythonDataService/).
      # Without this, ``podman exec ... ruff check`` silently runs with
      # the default ruleset and misses every SIM/UP/I issue CI flags.
      - ./PythonDataService/ruff.toml:/app/ruff.toml:ro,z
      # Golden-fixture manifest — read at runtime by GET /api/golden-fixtures.
      # Mounted so manifest edits are visible without rebuild; baked into the
      # image too (see Dockerfile) so prod images don't depend on the mount.
      - ./PythonDataService/tests/fixtures/golden/manifest.json:/app/tests/fixtures/golden/manifest.json:ro,z
      - ../Lean/Data:/lean-data:ro,z
      - ./PythonDataService/lean-cache:/lean-cache:z
      # Divergence study artifacts (dashboard HTML + matrix CSV) live here.
      # Mounted so /research/data-divergence/* can serve host-built files and
      # rebuilds persist across container restarts.
      - ./PythonDataService/cache:/app/cache:z
      # Live-runtime artifacts (Phase C IBKR paper-shadow output —
      # decisions/executions/trades.parquet, run_ledger.json,
      # halt.flag, poisoned.flag, reconcile/*). The container-side
      # `start --readonly` writes here; the host-side `reconcile`
      # reads from the same files. Without this mount the writers'
      # parquets would vanish on container restart and not be
      # visible to host-side commands. See
      # docs/runbooks/ibkr-paper-dry-run.md prereqs.
      - ./PythonDataService/artifacts:/app/artifacts:z
      # Data lake writer mount (Slice 1b). Default host path is ./data-lake-volume
      # (gitignored); override LEAN_DATA_VOLUME_HOST_PATH in .env for a different root.
      # Layout inside this mount: lake/ (canonical artifacts) + staging/ (writer scratch),
      # both on the same filesystem so atomic rename works.
      - ${LEAN_DATA_VOLUME_HOST_PATH:-./data-lake-volume}:/lean-data-writer:rw,z
    environment:
      - POLYGON_API_KEY=${POLYGON_API_KEY}
      - POLYGON_RATE_LIMIT_PER_MIN=${POLYGON_RATE_LIMIT_PER_MIN:-0}
      - FRED_API_KEY=${FRED_API_KEY}
      - LEAN_DATA_ROOT=/lean-data
      - LEAN_DATA_CACHE=/lean-cache
      # Phase 1c topology — the launcher is a HOST process (it owns
      # podman access), not a compose container. The data-plane reaches
      # it via the ``host.containers.internal`` alias registered in
      # ``extra_hosts`` below (resolves to the bridge gateway = host
      # machine on Linux Podman and Windows Podman alike). Override
      # ``LEAN_LAUNCHER_URL`` only for non-standard runtimes (remote
      # launcher, non-default port).
      - LEAN_LAUNCHER_URL=${LEAN_LAUNCHER_URL:-http://host.containers.internal:8090}
      - HOST=0.0.0.0
      - PORT=8000
      - ALLOWED_ORIGINS=http://backend:8080,http://localhost:5000,http://localhost:4200
      - DATA_PLANE_CONTROL_SECRET=${DATA_PLANE_CONTROL_SECRET:-local-dev-control-secret}
      - BACKEND_URL=http://backend:8080
      - REDIS_URL=redis://:${REDIS_PASSWORD:-local-dev-redis-password}@redis:6379/0
      # Data lake writer root (Slice 1b). Container path of the host-bind mount above.
      - LEAN_DATA_WRITE_ROOT=/lean-data-writer
      # Data lake catalog — asyncpg URL; same host/db/creds as the backend.
      # Required when DATA_LAKE_ENABLED=true or for schema-drift integration tests.
      - POSTGRES_URL=postgres://postgres:${POSTGRES_PASSWORD}@db:5432/postgres
      # Polygon paid plans (Starter / Developer / Advanced) all have no
      # per-minute cap; only the free Basic tier is 5/min. Set to a
      # positive integer here only if you're on the free tier.
      - POLYGON_RATE_LIMIT_PER_MIN=${POLYGON_RATE_LIMIT_PER_MIN:-0}
      # IBKR paper-trading integration (Phase 1, see
      # docs/architecture/ibkr-integration-phase1.md). Defaults match
      # IbkrSettings; surfaced here so they're greppable in compose.
      - IBKR_MODE=${IBKR_MODE:-paper}
      # ``auto`` first tries the Podman/Docker host alias
      # ``host.containers.internal`` (registered above via ``extra_hosts``),
      # then ``host.docker.internal``, then the container's default gateway
      # from /proc/net/route — see app/broker/ibkr/client.py:_resolve_host.
      # The alias path matters on macOS Podman applehv, where the default
      # gateway is the Podman VM's loopback rather than the macOS host
      # where IB Gateway runs. Override to a specific IP only when pinning
      # to a particular interface.
      - IBKR_HOST=${IBKR_HOST:-auto}
      - IBKR_PORT=${IBKR_PORT:-4002}
      - IBKR_CLIENT_ID=${IBKR_CLIENT_ID:-1}
      - IBKR_PERSIST_TICKS=${IBKR_PERSIST_TICKS:-false}
      # Operator kill switch for order placement. Default true (matches
      # IbkrSettings.readonly). Must be surfaced through compose because
      # the container does NOT read host .env directly — without this
      # line, flipping IBKR_READONLY=false in .env has no effect and the
      # error message in orders.py is misleading.
      - IBKR_READONLY=${IBKR_READONLY:-true}
      # Broker enable/disable switch. Set false when host-venv cmd_start owns
      # the IBKR session. The container stays up for the live-runs router.
      - IBKR_BROKER_ENABLED=${IBKR_BROKER_ENABLED:-true}
      # Live-run artifact root. Container path is fixed by the volume mount
      # (./PythonDataService/artifacts:/app/artifacts).
      - IBKR_LIVE_RUNS_ROOT=/app/artifacts/live_runs
      # PRD #684 — macOS/Podman bind mounts do not propagate inotify
      # reliably into the container. Force watchfiles polling so
      # ``uvicorn --reload`` sees host edits, and surface the mode via
      # /api/broker/data-plane/health.
      - WATCHFILES_FORCE_POLLING=${WATCHFILES_FORCE_POLLING:-true}
      - UVICORN_RELOAD=${UVICORN_RELOAD:-true}
    # Map stable host aliases to the container's default gateway (the
    # host on Linux Podman and Windows Podman). ``host.containers.internal``
    # is the Podman-native spelling; ``host.docker.internal`` remains
    # registered for Docker/Desktop compatibility and older local envs.
    # Used by both IB Gateway and the LEAN Sidecar launcher; reach them
    # via a host alias rather than a hardcoded LAN IP.
    extra_hosts:
      - "host.containers.internal:host-gateway"
      - "host.docker.internal:host-gateway"
    depends_on:
      redis:
        condition: service_healthy
    command:
      - /bin/sh
      - -c
      - |
        case "$$(printf '%s' "$${UVICORN_RELOAD:-true}" | tr '[:upper:]' '[:lower:]')" in
          false|0|no|off)
            exec uvicorn app.main:app --host 0.0.0.0 --port 8000 --timeout-graceful-shutdown 10
            ;;
        esac
        exec uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload --timeout-graceful-shutdown 10
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      # Cold boot blocks ~12s on IBKR connect retries (3 attempts × ~4s each)
      # before uvicorn binds the port. 10s wasn't enough — compose flipped
      # unhealthy and stalled backend/frontend startup. 45s gives the IBKR
      # retry window headroom without slowing warm restarts.
      start_period: 45s
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: "2.0"
        reservations:
          memory: 512M
    networks:
      - app-network

  backend:
    image: mcr.microsoft.com/dotnet/sdk:10.0
    container_name: my-backend
    restart: always
    working_dir: /src
    ports:
      # Default host exposure is loopback-only; widen deliberately for remote/shared envs.
      - "127.0.0.1:5000:8080"
    volumes:
      - ./Backend:/src:z
    environment:
      - ConnectionStrings__DefaultConnection=Host=db;Database=postgres;Username=postgres;Password=${POSTGRES_PASSWORD}
      - PolygonService__BaseUrl=http://python-service:8000
      - REDIS_URL=redis:6379,password=${REDIS_PASSWORD:-local-dev-redis-password}
      - DOTNET_USE_POLLING_FILE_WATCHER=true
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:8080
      # csc (Roslyn) SIGILLs with exit 132 on Apple Silicon under Podman
      # applehv. cpuinfo advertises sve2/sme2/sme2p1, but the AppleHV-
      # virtualized CPU can't actually execute every SVE/SME sequence the
      # .NET 10 SDK's R2R-precompiled images contain. The single runtime
      # intrinsic toggles (DOTNET_EnableHWIntrinsic, DOTNET_EnableArm64Sve,
      # DOTNET_EnableArm64Sme) don't help individually — bisected with all
      # 10.0.x SDK tags tested (10.0.100, 10.0.300; Ubuntu and AzureLinux
      # base images). Minimum stable combo to bypass R2R-baked code:
      #   - ReadyToRun=0 — forces JIT instead of R2R-baked native code
      #   - TieredCompilation=0 — skips tier-0 quick-JIT (still hits SME)
      # These two flags MUST be paired with the 3G memory limit below — at
      # 1G csc still SIGILLs even with both flags set (an unlimited-memory
      # one-shot `podman run` hides this and falsely "passes"). HotChocolate
      # source generators + EF Core code-gen on a 134-file project push the
      # build process past 1G, and the OOM-adjacent JIT path re-enters the
      # SVE/SME failure mode the flags otherwise avoid.
      # Cost: slower cold start (R2R) and no adaptive optimization (TC).
      # Acceptable for dev container; production builds elsewhere unaffected.
      - DOTNET_ReadyToRun=0
      - DOTNET_TieredCompilation=0
    command: ["dotnet", "watch", "run", "--non-interactive"]
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 6
      # Cold `dotnet watch run` takes 30–60s to compile from scratch on
      # the first --no-cache rebuild. 15s wasn't enough — compose marked
      # the backend unhealthy and aborted frontend startup. 90s gives
      # cold builds room without slowing warm restarts (start_period
      # only delays the first check; retries handle steady-state).
      start_period: 90s
    deploy:
      resources:
        limits:
          # See env comment above: 1G is not enough to clear the csc SIGILL
          # window even with R2R=0 + TieredCompilation=0. HotChocolate's
          # source generators on this project's 134 files push the build
          # process past 1G and re-enter the SVE/SME-baked code path.
          memory: 3G
    depends_on:
      db:
        condition: service_healthy
      python-service:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - app-network

  frontend:
    build: ./Frontend
    container_name: my-frontend
    restart: always
    ports:
      # Default host exposure is loopback-only; widen deliberately for remote/shared envs.
      - "127.0.0.1:4200:4200"
    volumes:
      - ./Frontend/src:/app/src:z
      - ./Frontend/proxy.conf.js:/app/proxy.conf.js:z
      # Repo-root contracts are outside the Frontend image context, but
      # tsconfig maps @repo-contracts/* to ../contracts/* which resolves to
      # /contracts/* from the dev container's /app baseUrl.
      - ./contracts:/contracts:ro,z
      # PRD #593 / ADR 0012 — cross-language ``ActionPlan`` parity
      # fixtures live in PythonDataService so Pydantic stays
      # authoritative; mount them read-only inside src/testing/ so the
      # angular-compiler (which scopes module resolution to src/) can
      # resolve them. See Frontend/src/app/api/action-plan-validator.spec.ts
      # and tsconfig.spec.json's ``src/testing/**/*.json`` include.
      - ./PythonDataService/tests/fixtures/action_plan:/app/src/testing/action_plan_fixtures:ro,z
    environment:
      # Angular 21's esbuild compiler runs worker threads; default Node heap
      # caps them at ~512MB which is not enough for this project's bundle
      # (primeng + apollo + chart.js + lightweight-charts + katex). Raise the
      # old-space limit so workers don't hit ERR_WORKER_OUT_OF_MEMORY.
      - NODE_OPTIONS=--max-old-space-size=3584
      # Keep Angular's dev proxy secret in lockstep with the Python data plane.
      - DATA_PLANE_CONTROL_SECRET=${DATA_PLANE_CONTROL_SECRET:-local-dev-control-secret}
    command: ["npx", "ng", "serve", "--host", "0.0.0.0", "--poll", "2000", "--proxy-config", "proxy.conf.js"]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4200"]
      interval: 10s
      timeout: 5s
      retries: 3
      # Initial Angular compile on a cold container takes 60–90s; give it
      # room before the first healthcheck fires.
      start_period: 120s
    deploy:
      resources:
        limits:
          memory: 4G
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - app-network

volumes:
  pgdata:

networks:
  app-network:
    driver: bridge
